<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Visualização Agendamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#view-schedule-modal" class="button-style-open">Modal Visualização Agendamento</a>

    <div id="view-schedule-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Título do Agendamento</h2>

            <div class="schedule-details">
                <div class="info-group">
                    <span class="info-label">Descrição:</span>
                    <div class="info-data">Sessão de fotos ao ar livre</div>
                </div>
                <div class="info-group">
                    <span class="info-label">Data:</span>
                    <div class="info-data">14 de Maio de 2025</div>
                </div>
                <div class="info-group">
                    <span class="info-label">Local:</span>
                    <div class="info-data">Parque da Cidade</div>
                </div>
                <div class="info-group">
                    <span class="info-label">Cliente:</span>
                    <div class="info-data">Nome do Cliente Exemplo</div>
                </div>
            </div>
            
            <div class="modal-footer">
                <a href="#" class="button-style">Editar</a>
                <a href="#" class="button-style button-danger">Excluir</a>
                <a href="#" class="button-style">Fechar</a>
            </div>
        </div>
    </div>

</body>
</html>
